# Browser
browser=chrome
headless=false
implicit.wait.seconds=10
page.load.timeout.seconds=30

# Application under test
base.url=https://www.saucedemo.com/
api.base.url=https://httpbin.org

# Test credentials (Sauce Demo)
valid.username=standard_user
valid.password=secret_sauce

# AI agent — add key in .env (never commit real keys):
#   OpenRouter: OPENROUTER_API_KEY=sk-or-v1-...
#   Gemini:     GEMINI_API_KEY=...
#   OpenAI:     OPENAI_API_KEY=sk-...
ai.agent.enabled=true
ai.provider=openrouter
ai.model=openai/gpt-4o-mini
ai.openrouter.base.url=https://openrouter.ai/api/v1
ai.openrouter.site.url=http://localhost
ai.openrouter.app.name=TestMu AI Framework
ai.agent.memory.path=agent-memory
ai.agent.insights.dir=reports/failure-insights
ai.html.max.chars=20000
ai.self.healing.enabled=true
ai.heal.max.retries=1
ai.heal.min.confidence=0.7
ai.heal.patch.source=false

# LLM test generation
ai.test.generation.enabled=true
ai.test.generation.output.dir=src/test/java/com/testmu/tests/generated

# Flaky test classifier
ai.flaky.classifier.enabled=true
ai.flaky.threshold=0.3

# Reporting
screenshot.on.failure=true
screenshot.on.pass=true
reports.dir=reports
extent.report.enabled=true
extent.report.dir=reports/extent
extent.report.name=TestMu_Automation_Report
